# Services de développement local d'AlgoDémo
# Démarrage : docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: algodemo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-algodemo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-algodemo}
      POSTGRES_DB: ${DB_NAME:-algodemo}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-algodemo} -d ${DB_NAME:-algodemo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Serveur vidéo temps réel (open source, auto-hébergé) pour les débats en live.
  # Le backend délivre les jetons d'accès selon le rôle (publier / regarder).
  livekit:
    image: livekit/livekit-server:v1.8
    container_name: algodemo_livekit
    restart: unless-stopped
    # --node-ip : IP annoncée aux navigateurs pour la connexion média (WebRTC).
    #   127.0.0.1 = test sur le même PC. Pour des téléphones/appareils distants,
    #   mettre l'IP LAN du PC dans LIVEKIT_NODE_IP (.env), ex. 192.168.1.20.
    command: --config /etc/livekit.yaml --node-ip ${LIVEKIT_NODE_IP:-127.0.0.1}
    environment:
      # ⚠️ Clés de DÉVELOPPEMENT — doivent correspondre à LIVEKIT_API_KEY/SECRET du .env.
      # À régénérer pour la production (voir README).
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret_a_changer_32chars_min_ok}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "${LIVEKIT_PORT:-7880}:7880"      # signalisation WebSocket / API
      - "7881:7881"                        # WebRTC TCP (repli)
      - "7882:7882/udp"                    # médias WebRTC (UDP)

  # Stockage de fichiers S3-compatible (vidéos, images, replays, audio).
  # Console d'administration : http://localhost:9001
  minio:
    image: minio/minio:latest
    container_name: algodemo_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-algodemo}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-algodemo-secret}
    ports:
      - "9000:9000"   # API S3 (les fichiers sont servis ici)
      - "9001:9001"   # console web d'administration
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
