# PostgreSQL 16 pour le développement local d'AlgoDémo
# Démarrage : docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: algodemo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-algodemo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-algodemo}
      POSTGRES_DB: ${DB_NAME:-algodemo}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-algodemo} -d ${DB_NAME:-algodemo}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
